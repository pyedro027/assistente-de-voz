<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente de Estudos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181b22;
    --border: #1f2330;
    --accent: #5b8bff;
    --accent2: #a78bfa;
    --red: #f87171;
    --green: #34d399;
    --text: #e8eaf0;
    --muted: #6b7280;
    --user-bubble: #1a2340;
    --ai-bubble: #141820;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,139,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,139,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(10,12,16,0.9);
    backdrop-filter: blur(12px);
  }

  .logo-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .voice-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .toggle-switch {
    width: 36px; height: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle-switch.on { background: var(--accent); border-color: var(--accent); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .toggle-switch.on::after { left: 18px; }

  #chat {
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 820px;
    width: 100%;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.user .avatar { background: var(--user-bubble); border: 1px solid rgba(91,139,255,0.3); }
  .msg.ai .avatar { background: var(--ai-bubble); border: 1px solid rgba(167,139,250,0.3); }

  .bubble {
    padding: 11px 15px;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.65;
    max-width: calc(100% - 42px);
  }
  .msg.user .bubble { background: var(--user-bubble); border: 1px solid rgba(91,139,255,0.2); border-top-right-radius: 3px; }
  .msg.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 3px; }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble em { color: var(--accent2); font-style: normal; }
  .bubble code { background: rgba(255,255,255,0.07); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.83em; }

  .typing-dots { display: flex; gap: 5px; align-items: center; padding: 5px 0; }
  .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); animation: blink 1.2s infinite; opacity: 0.4; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); } 40% { opacity: 1; transform: scale(1.1); } }

  /* Status */
  #status-bar {
    position: relative;
    z-index: 10;
    padding: 9px 20px;
    background: rgba(10,12,16,0.95);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 40px;
  }

  #status-text { font-size: 0.78rem; color: var(--muted); font-style: italic; }

  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    display: none;
  }
  #status-bar.listening .pulse-dot { display: block; background: var(--red); animation: pdot 1s infinite; }
  #status-bar.speaking .pulse-dot { display: block; background: var(--accent2); animation: pdot 0.8s infinite; }
  #status-bar.thinking .pulse-dot { display: block; background: var(--accent); animation: pdot 1.2s infinite; }
  @keyframes pdot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(0.5); } }

  /* Bottom */
  #bottom {
    position: relative;
    z-index: 10;
    padding: 12px 16px 16px;
    background: rgba(10,12,16,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
  }

  .controls { display: flex; gap: 10px; align-items: center; }

  #mic-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
    font-size: 1.4rem;
  }
  #mic-btn.idle { background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 20px rgba(91,139,255,0.3); }
  #mic-btn.listening { background: linear-gradient(135deg, var(--red), #f43f5e); animation: mPulse 1.5s infinite; }
  #mic-btn.speaking { background: linear-gradient(135deg, var(--accent2), #7c3aed); animation: mPulse 0.9s infinite; }
  #mic-btn.thinking { background: var(--surface2); cursor: not-allowed; opacity: 0.5; }

  @keyframes mPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); box-shadow: 0 0 30px rgba(91,139,255,0.5); }
  }

  #text-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    height: 52px;
    line-height: 1.4;
  }
  #text-input:focus { border-color: rgba(91,139,255,0.5); }
  #text-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 52px; height: 52px;
    border-radius: 10px;
    border: none;
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent); color: white; }

  #stop-btn {
    width: 52px; height: 52px;
    border-radius: 10px;
    border: 1px solid rgba(248,113,113,0.3);
    background: rgba(248,113,113,0.1);
    color: var(--red);
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #stop-btn.visible { display: flex; }
  #stop-btn:hover { background: rgba(248,113,113,0.25); }

  .welcome {
    align-self: center;
    text-align: center;
    padding: 32px 20px;
    max-width: 380px;
  }
  .welcome-icon { font-size: 2.8rem; margin-bottom: 14px; display: block; }
  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .welcome p { font-size: 0.83rem; color: var(--muted); line-height: 1.6; }

  #toast {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1f1015;
    border: 1px solid rgba(248,113,113,0.4);
    color: var(--red);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Assistente de Estudos</h1>
  <div class="voice-toggle" id="voice-toggle-wrap">
    <span id="voice-label">🔊 Voz</span>
    <div class="toggle-switch on" id="voice-toggle"></div>
  </div>
</header>

<div id="chat">
  <div class="welcome">
    <span class="welcome-icon">🎓</span>
    <h2>Vamos conversar?</h2>
    <p>Clique no microfone e fale sua dúvida. O assistente responde em voz alta e já fica pronto pra ouvir você de novo.</p>
  </div>
</div>

<div id="status-bar">
  <div class="pulse-dot"></div>
  <span id="status-text">Clique no microfone para começar</span>
</div>

<div id="bottom">
  <div class="controls">
    <button id="mic-btn" class="idle">🎤</button>
    <textarea id="text-input" placeholder="Ou digite sua dúvida aqui..." rows="1"></textarea>
    <button id="stop-btn" title="Parar fala">⏹</button>
    <button id="send-btn" title="Enviar">➤</button>
  </div>
</div>

<div id="toast"></div>

<script>
const chat = document.getElementById('chat');
const micBtn = document.getElementById('mic-btn');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const statusBar = document.getElementById('status-bar');
const statusText = document.getElementById('status-text');
const voiceToggle = document.getElementById('voice-toggle');
const voiceToggleWrap = document.getElementById('voice-toggle-wrap');

let recognition = null;
let isListening = false;
let isSpeaking = false;
let voiceEnabled = true;
const history = [];

// ---- Toggle voz ----
voiceToggleWrap.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  voiceToggle.classList.toggle('on', voiceEnabled);
  if (!voiceEnabled) stopSpeaking();
});

// ---- Speech Recognition ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
  micBtn.style.opacity = '0.4';
  micBtn.style.cursor = 'not-allowed';
  showToast('Sem suporte a voz. Use Chrome para falar.');
} else {
  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    micBtn.className = 'listening';
    micBtn.textContent = '⏹';
    setStatus('listening', '🎤 Ouvindo...');
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (interim) setStatus('listening', `"${interim}"`);
    if (final) {
      textInput.value = final;
      stopListening();
      sendMessage(final);
    }
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error !== 'aborted' && e.error !== 'no-speech') {
      showToast('Erro no microfone: ' + e.error);
    }
    setStatus('', 'Clique no microfone para começar');
  };

  recognition.onend = () => { if (isListening) stopListening(); };
}

function startListening() {
  if (!recognition) return;
  stopSpeaking();
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  isListening = false;
  micBtn.className = 'idle';
  micBtn.textContent = '🎤';
  if (recognition) try { recognition.stop(); } catch(e) {}
}

micBtn.addEventListener('click', () => {
  if (isSpeaking) { stopSpeaking(); return; }
  if (isListening) stopListening();
  else startListening();
});

// ---- Text to Speech ----
function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) {
    setStatus('', 'Clique no microfone para responder');
    setTimeout(() => startListening(), 500);
    return;
  }

  stopSpeaking();

  const clean = text
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/`(.+?)`/g, '$1')
    .replace(/#+ /g, '')
    .trim();

  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.lang = 'pt-BR';
  utterance.rate = 1.05;
  utterance.pitch = 1;

  const voices = window.speechSynthesis.getVoices();
  const ptVoice = voices.find(v => v.lang.startsWith('pt-BR')) || voices.find(v => v.lang.startsWith('pt'));
  if (ptVoice) utterance.voice = ptVoice;

  utterance.onstart = () => {
    isSpeaking = true;
    micBtn.className = 'speaking';
    micBtn.textContent = '⏹';
    stopBtn.classList.add('visible');
    setStatus('speaking', '🔊 Falando... (clique no ⏹ para interromper)');
  };

  utterance.onend = () => {
    isSpeaking = false;
    stopBtn.classList.remove('visible');
    micBtn.className = 'idle';
    micBtn.textContent = '🎤';
    setStatus('', 'Clique no microfone para responder');
    // loop: depois de falar, ouve automaticamente
    setTimeout(() => { if (!isListening && !isSpeaking) startListening(); }, 700);
  };

  utterance.onerror = () => {
    isSpeaking = false;
    stopBtn.classList.remove('visible');
    micBtn.className = 'idle';
    micBtn.textContent = '🎤';
    setStatus('', 'Clique no microfone para responder');
  };

  window.speechSynthesis.speak(utterance);
}

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  isSpeaking = false;
  stopBtn.classList.remove('visible');
}

stopBtn.addEventListener('click', () => {
  stopSpeaking();
  micBtn.className = 'idle';
  micBtn.textContent = '🎤';
  setStatus('', 'Clique no microfone para continuar');
});

// vozes carregam async em alguns browsers
if (window.speechSynthesis) window.speechSynthesis.getVoices();

// ---- Status ----
function setStatus(state, text) {
  statusBar.className = state || '';
  statusText.textContent = text;
}

// ---- Mensagens ----
function removeWelcome() {
  const w = chat.querySelector('.welcome');
  if (w) w.remove();
}

function addMessage(role, content) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'ai' && content === '__typing__') {
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    div.id = 'typing-msg';
  } else {
    bubble.innerHTML = formatText(content);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .split('\n\n').map(p => p.trim() ? `<p>${p.replace(/\n/g, '<br>')}</p>` : '').join('');
}

// ---- Envio ----
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const v = textInput.value.trim();
    if (v) sendMessage(v);
  }
});
sendBtn.addEventListener('click', () => {
  const v = textInput.value.trim();
  if (v) sendMessage(v);
});

async function sendMessage(text) {
  if (!text.trim()) return;
  textInput.value = '';
  stopSpeaking();
  stopListening();

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  micBtn.className = 'thinking';
  micBtn.textContent = '⏳';
  setStatus('thinking', '💭 Pensando...');
  const typingEl = addMessage('ai', '__typing__');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Você é um assistente de estudos inteligente, paciente e amigável, que responde sempre em português brasileiro.
Ajude o aluno a entender conceitos, resolver dúvidas, criar resumos e praticar exercícios.
IMPORTANTE: Suas respostas serão lidas em voz alta, então escreva de forma natural e conversacional, como se estivesse explicando pespessoalmente. Evite listas com bullets ou símbolos — prefira frases e parágrafos fluidos. Seja conciso mas completo. Use no máximo 3 parágrafos curtos.`,
        messages: history
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Desculpe, não consegui gerar uma resposta.';

    typingEl.remove();
    addMessage('ai', reply);
    history.push({ role: 'assistant', content: reply });

    micBtn.className = 'idle';
    micBtn.textContent = '🎤';
    setStatus('', '');

    speak(reply);

  } catch (err) {
    typingEl.remove();
    addMessage('ai', 'Ocorreu um erro ao conectar com a IA. Verifique sua conexão.');
    micBtn.className = 'idle';
    micBtn.textContent = '🎤';
    setStatus('', 'Clique no microfone para tentar de novo');
  }
}

// ---- Toast ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
